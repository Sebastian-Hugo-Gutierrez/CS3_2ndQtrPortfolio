
<html> 
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Add A Movie</title>

    </head>
    <style>
    </style>
    <body>
    <form id="form1">
        <label for="title">Title:</label><br>
        <input type="text" id="title" name="title" required><br>

        <label for="year">Year:</label><br>
        <input type="number" id="year" name="year" required><br>

        <label for="genre">Genre:</label><br>
        <select type="text" id="genre" name="genre" required><br>
        <option value="Action">Action</option>
        <option value="Comedy">Comedy</option>
        <option value="Horror">Horror</option>
        <option value="Sci-fi">Sci-fi</option>
        <option value="Romance">Romance</option>

        <label for="rating">Rating:</label><br>
        <div class="rating">
			<span id="rating">0</span>/5
		</div>
		<div class="stars" id="stars">
			<span class="star" data-value="1">★</span>
			<span class="star" data-value="2">★</span>
			<span class="star" data-value="3">★</span>
			<span class="star" data-value="4">★</span>
			<span class="star" data-value="5">★</span>
		</div>

        <input type="submit" value="Submit"><br>
        <input type="button" onreset="resetFunction()" value="Reset"><br>
        <input type="button" value="View Movies" onclick="document.location='viewMovies.html'"> 
    </form>

    <script>
        const stars = document.querySelectorAll('.star');
        const rating = document.getElementById('rating');

        stars.forEach(star => {
            star.addEventListener('click', () => {
                const value = star.getAttribute('data-value');
                rating.textContent = value;
                stars.forEach(s => s.classList.remove('selected'));
                star.classList.add('selected');
            });
        });
    </script>
    </body>
</html>
